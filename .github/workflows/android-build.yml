name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      firebase_api_key:
        description: 'EXPO_PUBLIC_FIREBASE_API_KEY'
        required: true
      firebase_auth_domain:
        description: 'EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN'
        required: true
      firebase_project_id:
        description: 'EXPO_PUBLIC_FIREBASE_PROJECT_ID'
        required: true
      firebase_storage_bucket:
        description: 'EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET'
        required: true
      firebase_messaging_sender_id:
        description: 'EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
        required: true
      firebase_app_id:
        description: 'EXPO_PUBLIC_FIREBASE_APP_ID'
        required: true
      firebase_measurement_id:
        description: 'EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID'
        required: false

jobs:
  build:
    name: Build Android Debug Bundle
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (Expo stable LTS version 20) with caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Setup JDK 17 (Zulu distribution)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Setup Android SDK and accept licenses
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Setup Gradle and wrapper caching to speed up builds
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      # 6. Validate workflow inputs before starting build steps
      - name: Validate environment inputs
        run: |
          echo "Validating Firebase environment variables..."
          if [ -z "${{ github.event.inputs.firebase_api_key }}" ] || \
             [ -z "${{ github.event.inputs.firebase_auth_domain }}" ] || \
             [ -z "${{ github.event.inputs.firebase_project_id }}" ] || \
             [ -z "${{ github.event.inputs.firebase_storage_bucket }}" ] || \
             [ -z "${{ github.event.inputs.firebase_messaging_sender_id }}" ] || \
             [ -z "${{ github.event.inputs.firebase_app_id }}" ]; then
            echo "::error::One or more required Firebase inputs are missing."
            exit 1
          fi
          echo "Validation successful!"

      # 7. Validate GOOGLE_SERVICES_JSON secret
      - name: Validate GOOGLE_SERVICES_JSON secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "Validating GOOGLE_SERVICES_JSON secret..."
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::The GOOGLE_SERVICES_JSON secret is missing from GitHub repository settings."
            exit 1
          fi
          echo "Secret validation successful!"

      # 8. Install dependencies deterministically
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 9. Create local environment configuration (.env)
      - name: Create environment configuration
        run: |
          echo "Creating .env file..."
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ github.event.inputs.firebase_api_key }}" > .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ github.event.inputs.firebase_auth_domain }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ github.event.inputs.firebase_project_id }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ github.event.inputs.firebase_storage_bucket }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ github.event.inputs.firebase_messaging_sender_id }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ github.event.inputs.firebase_app_id }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ github.event.inputs.firebase_measurement_id }}" >> .env

      # 10. Write root google-services.json from secret
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "Writing google-services.json to root..."
          printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json

      # 11. Run Expo prebuild cleanly to generate native Android folders
      - name: Prebuild Expo project
        run: npx expo prebuild --platform android --clean --no-install

      # 12. Copy google-services.json into android/app module
      - name: Inject google-services.json into android/app
        run: |
          echo "Injecting google-services.json into android/app directory..."
          mkdir -p android/app
          cp google-services.json android/app/google-services.json

      # 13. Verify that all required native Android files exist (supporting both Groovy and Kotlin DSLs)
      - name: Verify generated Android project files
        run: |
          echo "Verifying required generated native files..."
          
          check_file() {
            for f in "$@"; do
              if [ -f "$f" ]; then
                echo "✓ $f exists"
                return 0
              fi
            done
            echo "::error::Required generated native files not found: $@"
            exit 1
          }
          
          check_file "android/build.gradle" "android/build.gradle.kts"
          check_file "android/settings.gradle" "android/settings.gradle.kts"
          check_file "android/gradle.properties"
          check_file "android/app/build.gradle" "android/app/build.gradle.kts"
          check_file "android/app/google-services.json"

      # 14. Run custom build validation script
      - name: Validate configuration and package names
        run: node scripts/validate-build.js

      # 15. Log environment and native directory diagnostics
      - name: Print Build Environment and Native Diagnostics
        run: |
          echo "=== System Information ==="
          echo "Node Version: $(node -v)"
          echo "Java Version: $(java -version 2>&1 | head -n 1)"
          echo "Expo CLI Version: $(npx expo --version)"
          echo "React Native Version: $(npx react-native --version 2>&1 || echo 'Not installed globally')"
          echo "Gradle Wrapper Version: $(cd android && ./gradlew --version | grep Gradle)"
          echo ""
          echo "=== Android Directory Structure (Level 2) ==="
          if command -v tree &> /dev/null; then
            tree -L 2 android
          else
            find android -maxdepth 2
          fi
          echo ""
          echo "=== Firebase Config Existence check ==="
          ls -la android/app/google-services.json

      # 16. Print generated Gradle files for debugging
      - name: Print Gradle configuration files
        run: |
          echo "=== android/build.gradle(.kts) ==="
          cat android/build.gradle 2>/dev/null || cat android/build.gradle.kts
          echo "=== android/app/build.gradle(.kts) ==="
          cat android/app/build.gradle 2>/dev/null || cat android/app/build.gradle.kts
          echo "=== android/settings.gradle(.kts) ==="
          cat android/settings.gradle 2>/dev/null || cat android/settings.gradle.kts
          echo "=== android/gradle.properties ==="
          cat android/gradle.properties

      # 17. Run Gradle task with stacktrace diagnostics enabled
      - name: Build Android Debug APK
        run: |
          cd android
          set -o pipefail
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --debug \
            --warning-mode all 2>&1 | tee ../gradle-build.log

      # 18. Verify APK was generated successfully before uploading
      - name: Verify APK existence
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK file was not generated at expected path: $APK_PATH"
            exit 1
          fi
          echo "APK successfully verified!"

      # 19. Classify Gradle build failure if build execution fails
      - name: Classify Build Failure
        if: failure()
        run: node scripts/classify-failure.js

      # 20. Upload compiled Gradle reports and logs if build execution fails
      - name: Upload Gradle Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-reports
          path: |
            android/build/reports/
            android/app/build/reports/
            gradle-build.log
            ~/.gradle/daemon/*/log

      # 21. Upload the compiled APK artifact
      - name: Upload Android Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthquest-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
